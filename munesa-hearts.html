<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Munesa yurakchalari - sevgi animatsiyasi">
  <title>Munesa Yurakchalari ❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #title {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      color: #ff8fab; font-family: Arial, sans-serif; font-size: 30px;
      font-weight: bold; letter-spacing: 5px;
      text-shadow: 0 0 20px rgba(255,77,109,0.7), 0 2px 8px rgba(0,0,0,0.5);
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="title">❤ MUNESA ❤</div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    const W = () => canvas.width, H = () => canvas.height;
    const COLORS = ['#ff4d6d','#ff6b6b','#ff8fab','#ff5c8a','#ff3366','#ff1a53'];

    function heartPath(ctx, cx, cy, size) {
      ctx.beginPath();
      let first = true;
      for (let t = 0; t <= 360; t += 4) {
        const a = t * Math.PI / 180;
        const x = 16 * Math.pow(Math.sin(a), 3);
        const y = 13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a);
        const px = cx + x * size, py = cy - y * size;
        if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    class Heart {
      constructor(init) { this.reset(init); }
      reset(init) {
        this.size = 1.0 + Math.random() * 0.9;
        this.x = 60 + Math.random() * (W() - 120);
        this.y = init ? Math.random() * H() : H() + Math.random() * 200 + 60;
        this.dx = (Math.random() - 0.5) * 1.2;
        this.dy = 1.0 + Math.random() * 1.5;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.018 + Math.random() * 0.015;
        this.alpha = 0.7 + Math.random() * 0.3;
      }
      update() {
        this.wobble += this.wobbleSpeed;
        this.x += this.dx + Math.sin(this.wobble) * 0.5;
        this.y -= this.dy;
        if (this.y + 70 < -20 || this.x < -80 || this.x > W() + 80) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        heartPath(ctx, this.x, this.y, this.size);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        const fs = Math.max(9, Math.round(this.size * 10));
        ctx.globalAlpha = 1;
        ctx.fillStyle = 'white';
        ctx.font = `bold ${fs}px Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 4;
        ctx.fillText('MUNESA', this.x, this.y);
        ctx.restore();
      }
    }

    const hearts = Array.from({length: 14}, () => new Heart(true));

    // stars
    const stars = Array.from({length: 80}, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.4 + 0.3,
      a: Math.random() * 0.5 + 0.1,
      speed: Math.random() * 0.005 + 0.002
    }));
    let tick = 0;

    function loop() {
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, W(), H());
      tick++;
      stars.forEach(s => {
        const twinkle = 0.5 + 0.5 * Math.sin(tick * s.speed * 10 + s.x * 100);
        ctx.beginPath();
        ctx.arc(s.x * W(), s.y * H(), s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${s.a * twinkle})`;
        ctx.fill();
      });
      hearts.forEach(h => { h.update(); h.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
